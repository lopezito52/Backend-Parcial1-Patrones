spring:
  application:
    name: pedido-backend
  
  # Configuración de H2 (base de datos en memoria)
  datasource:
    url: jdbc:h2:mem:pedidodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # Configuración de JPA
  jpa:
    hibernate:
      ddl-auto: create-drop  # Crea las tablas al iniciar y las borra al cerrar
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    database-platform: org.hibernate.dialect.H2Dialect
  
  # Habilitar consola H2 (para ver la base de datos)
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

# Configuración del servidor
server:
  port: 8080
  servlet:
    context-path: /

# Logging
logging:
  level:
    com.tugrupo.pedidobackend: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE